<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auxílio HS Prime</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0b0000;
    font-family:Segoe UI, sans-serif;
}

/* 🔑 TELA KEY */
.key-screen{
    width:250px;
    height:250px;
    background:linear-gradient(160deg,#1a0000,#0d0000);
    border-radius:32px;
    padding:20px;
    box-shadow:0 0 30px red;
    border:1px solid rgba(255,0,0,0.6);
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.key-screen h2{
    text-align:center;
    color:#ff2a2a;
    margin-bottom:20px;
}

.key-screen input{
    padding:10px;
    border-radius:10px;
    border:none;
    background:#330000;
    color:white;
    margin-bottom:15px;
    text-align:center;
}

.key-screen button{
    padding:10px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#ff0000,#990000);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.key-error{
    text-align:center;
    color:red;
    height:18px;
    margin-top:8px;
}

/* 🔥 HUB ORIGINAL */
.phone{
    width:320px;
    height:350px;
    background:linear-gradient(160deg,#1a0000,#0d0000);
    border-radius:32px;
    padding:16px;
    box-shadow:0 0 30px red;
    border:1px solid rgba(255,0,0,0.6);
    color:white;
    display:none;
    flex-direction:column;
}

.hub-title{
    text-align:center;
    font-size:18px;
    color:#ff2a2a;
    text-shadow:0 0 12px red;
    margin-bottom:8px;
}

.tabs{
    display:flex;
    gap:6px;
    margin-bottom:10px;
}

.tab-btn{
    flex:1;
    padding:8px;
    background:#330000;
    border:none;
    color:white;
    border-radius:10px;
    cursor:pointer;
    font-size:13px;
}

.tab-btn.active{
    background:red;
}

.content{
    flex:1;
}

.tab-content{
    display:none;
}

.tab-content.active{
    display:block;
}

.option{
    display:flex;
    align-items:center;
    gap:8px;
    margin:12px 0;
    font-size:15px;
}

input[type="checkbox"]{
    width:18px;
    height:18px;
    accent-color:red;
}

select{
    width:100%;
    padding:8px;
    border-radius:10px;
    border:none;
    background:#330000;
    color:white;
    margin-top:6px;
}

input[type="range"]{
    width:100%;
    height:6px;
    accent-color:red;
    margin-top:8px;
}

.percent{
    font-size:13px;
    color:#ff2a2a;
    margin-top:4px;
}

button.inject{
    width:100%;
    margin-top:15px;
    padding:10px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#ff0000,#990000);
    font-size:14px;
    font-weight:bold;
    color:white;
    cursor:pointer;
}

.status{
    text-align:center;
    margin-top:8px;
    font-size:13px;
    height:16px;
}
</style>
</head>

<body>

<!-- 🔑 KEY -->
<div class="key-screen" id="keyScreen">
    <h2>INSIRA A KEY</h2>
    <input type="text" id="keyInput" placeholder="Digite a key">
    <button onclick="checkKey()">ENTRAR</button>
    <div class="key-error" id="keyError"></div>
</div>

<!-- 🔥 HUB -->
<div class="phone" id="hub">

    <div class="hub-title">AUXÍLIO HS PRIME</div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('main',this)">Principal</button>
        <button class="tab-btn" onclick="openTab('fps',this)">120 FPS</button>
    </div>

    <div class="content">

        <div id="main" class="tab-content active">
            <div class="option">
                <input type="checkbox">
                <label>Aimbot</label>
            </div>

            <div class="option">
                <input type="checkbox">
                <label>No Recoil</label>
            </div>

            <label>Selecionar HS</label>
            <select>
                <option>Cabeça</option>
                <option>Pescoço</option>
                <option>Peito</option>
            </select>

            <label style="margin-top:12px;display:block;">Precisão</label>
            <input type="range" min="0" max="100" value="50" id="precision">
            <div class="percent"><span id="value">50</span>%</div>

            <button class="inject" onclick="inject('statusMain')">INJETAR</button>
            <div class="status" id="statusMain"></div>
        </div>

        <div id="fps" class="tab-content">
            <div class="option">
                <input type="checkbox">
                <label>Force 120 FPS</label>
            </div>

            <div class="option">
                <input type="checkbox">
                <label>No Input Lag</label>
            </div>

            <div class="option">
                <input type="checkbox">
                <label>Reduzir Delay</label>
            </div>

            <button class="inject" onclick="inject('statusFps')">INJETAR</button>
            <div class="status" id="statusFps"></div>
        </div>

    </div>
</div>

<script>
const CORRECT_KEY = "HS2026VIP";

function checkKey(){
    const input = document.getElementById("keyInput").value;
    const error = document.getElementById("keyError");

    if(input === CORRECT_KEY){
        document.getElementById("keyScreen").style.display="none";
        document.getElementById("hub").style.display="flex";
    } else {
        error.textContent="Key incorreta!";
    }
}

const slider=document.getElementById("precision");
const value=document.getElementById("value");

slider.oninput=function(){
    value.textContent=this.value;
}

function inject(statusId){
    const status = document.getElementById(statusId);
    status.style.color="#ffae00";
    status.textContent="Injetando...";
    setTimeout(()=>{
        status.style.color="#00ff00";
        status.textContent="Injetado com sucesso";
    },2000);
}

function openTab(tabName,element){
    document.querySelectorAll(".tab-content").forEach(tab=>{
        tab.classList.remove("active");
    });
    document.querySelectorAll(".tab-btn").forEach(btn=>{
        btn.classList.remove("active");
    });
    document.getElementById(tabName).classList.add("active");
    element.classList.add("active");
}
</script>

</body>
  </html>
